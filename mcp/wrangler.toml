# Atomadic Forge — MCP HTTP Worker
# Exposes the Forge architecture-compiler tool surface over
# MCP Streamable HTTP transport (spec 2025-11-25) for Smithery,
# Claude Desktop HTTP, and any other MCP client that prefers a URL
# over a subprocess.
#
# Deploy:
#   cd cloudflare-workers/mcp
#   npm install
#   wrangler deploy
#
# The Worker URL becomes the Smithery / Claude Desktop "url" field:
#   https://forge-mcp.atomadictech.workers.dev/mcp

name = "forge-mcp"
main = "src/a4_sy_orchestration/index.ts"
compatibility_date = "2025-04-01"

[observability]
enabled = true

# Serve under forge.atomadic.tech — but ONLY the MCP-related paths.
# All other paths (/pricing, /account, /api/checkout, /subscribe, etc.)
# fall through to the Cloudflare Pages site at forge.atomadic.tech.
[[routes]]
pattern = "forge.atomadic.tech/mcp"
zone_id = "417adb5cfe88a9c62145ba1f62ab5f69"

[[routes]]
pattern = "forge.atomadic.tech/deluxe/mcp"
zone_id = "417adb5cfe88a9c62145ba1f62ab5f69"

[[routes]]
pattern = "forge.atomadic.tech/.well-known/mcp.json"
zone_id = "417adb5cfe88a9c62145ba1f62ab5f69"

[[routes]]
pattern = "forge.atomadic.tech/deluxe/.well-known/mcp.json"
zone_id = "417adb5cfe88a9c62145ba1f62ab5f69"

[[routes]]
pattern = "forge.atomadic.tech/health"
zone_id = "417adb5cfe88a9c62145ba1f62ab5f69"

[vars]
# Set GITHUB_TOKEN as a secret (wrangler secret put GITHUB_TOKEN)
# for higher GitHub API rate limits and private-repo access.
# The worker functions without it (60 req/hour unauthed).
FORGE_VERSION = "0.10.0"
